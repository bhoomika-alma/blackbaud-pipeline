# Supabase project config for the Blackbaud → HubSpot import tool.
# Functions are registered here as they are added in Phase 3.
project_id = "blackbaud-pipeline"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Max upload size for CSVs.
file_size_limit = "50MiB"

# Private bucket holding uploaded Blackbaud CSVs (created in Phase 1).
[storage.buckets.bb-uploads]
public = false
file_size_limit = "50MiB"
allowed_mime_types = ["text/csv", "application/vnd.ms-excel", "text/plain"]

[auth]
# No auth layer in this app — uploader/reviewer email is captured as plain text.
enabled = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Edge Functions. verify_jwt is off — this is a no-auth internal tool; the
# browser calls these with the anon key and the functions use the service role.
[functions.ingest]
verify_jwt = false

[functions.classify]
verify_jwt = false

# Registered as it is added later in Phase 3:
#   [functions.import]   verify_jwt = false
